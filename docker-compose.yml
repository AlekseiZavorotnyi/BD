version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: lab_1
    environment:
      POSTGRES_DB: employees
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
